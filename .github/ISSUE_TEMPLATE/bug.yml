name: Bug
description: Reportar um problema ou comportamento inesperado
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: descricao
    attributes:
      label: Descrição
      description: O que está acontecendo?
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
    validations:
      required: true
  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: prioridade
    attributes:
      label: Prioridade
      options:
        - Baixa
        - Média
        - Alta
        - Crítica
    validations:
      required: true
